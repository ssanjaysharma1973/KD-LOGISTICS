    <!-- Runtime API base override (helps dev builds pick correct backend without rebuilding) -->
    <!--
      If you need to force the frontend to use a specific backend at runtime,
      set window.__API_BASE in the browser console or add a script like:
      <script>window.__API_BASE = 'http://localhost:8080';</script>
      Do NOT set it to a string containing the environment variable name.
    -->
    <script>
      // Increase device offline threshold to 72 hours (ms) for local/dev runs
      // Override by setting window.__deviceOfflineThresholdMs in browser console if needed.
      window.__deviceOfflineThresholdMs = window.__deviceOfflineThresholdMs || (72 * 60 * 60 * 1000);
    </script>
